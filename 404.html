<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 - الصفحة غير موجودة | IQ System</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Tajawal',sans-serif;
            background:#0f0f1a;
            color:#f1f5f9;
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;text-align:center;padding:2rem
        }
        .e404__code{
            font-size:8rem;font-weight:900;
            background:linear-gradient(135deg,#6366f1,#06b6d4);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            line-height:1
        }
        .e404__text{font-size:1.4rem;color:#94a3b8;margin:1rem 0 2rem}
        .e404__btn{
            display:inline-flex;align-items:center;gap:0.5rem;
            padding:0.85rem 2rem;border-radius:50px;font-weight:600;
            background:linear-gradient(135deg,#6366f1,#06b6d4);
            color:white;text-decoration:none;transition:transform 0.25s
        }
        .e404__btn:active{transform:scale(0.95)}
    </style>
</head>
<body>
    <div>
        <div class="e404__code">404</div>
        <h1>عذراً، الصفحة غير موجودة</h1>
        <p class="e404__text">الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
        <a href="/" class="e404__btn">&#x2190; العودة للرئيسية</a>
    </div>
</body>
</html>
